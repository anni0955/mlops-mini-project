      - name: Login to AWS ECR
        run: |
          aws configure set aws_access_key_id ${{AWS_ACCESS_KEY_ID}}
          aws configure set aws_secret_access_key ${{AWS_SECRET_ACCESS_KEY}}
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 074467725081.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t mlops_mini_project_ecr .

      - name: Tag Docker image 
        run: |
          docker tag mlops_mini_project_ecr:latest 074467725081.dkr.ecr.us-east-1.amazonaws.com/mlops_mini_project_ecr:latest

      - name: Push Docker image to AWS ECR
        run: |
          docker push 074467725081.dkr.ecr.us-east-1.amazonaws.com/mlops_mini_project_ecr:latest