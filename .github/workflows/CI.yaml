name: CI pipeline

on: push 

jobs: 
  project-testing:
    runs-on: ubuntu-latest
    
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    
    steps: 
      - name: checkout code 
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run pipeline 
        run: |
          dvc repro

      - name: run model tests
        run: |
          python -m unittest tests/test_model.py

      - name: Promote model
        if: success()
        run: python scripts/promote_model.py 

      - name: Test Flask App
        if: success()
        run: python -m unittest tests/test_flask_app.py

      - name: Log in to the Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: build docker image
        if: success()
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/sentiment_analysis2:latest .

      - name: push docker image to Docker Hub
        if: success()
        run : docker push ${{ secrets.DOCKER_HUB_USERNAME }}/sentiment_analysis2:latest

      - name: Deploy to EC2
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }} 
          key: ${{ secrets.EC2_SSH_KEY }}
          scripts: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/sentiment_analysis2:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -p 80:5000 --name my-app ${{ secrets.DOCKER_HUB_USERNAME}}/sentiment_analysis2:latest